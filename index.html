<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Warung Randu Rindu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#fed7aa', // orange-200
                            DEFAULT: '#ea580c', // orange-600
                            dark: '#c2410c', // orange-700
                        },
                        dark: '#1e293b' // slate-800
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .cart-bar-enter { transform: translateY(100%); transition: transform 0.3s ease-out; }
        .cart-bar-enter-active { transform: translateY(0); }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-brand selection:text-white">

    <!-- Mobile App Container -->
    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-2xl overflow-hidden pb-24">
        
        <!-- Header / Hero Section -->
        <header class="relative bg-dark text-white rounded-b-3xl shadow-lg">
            <div class="absolute inset-0 overflow-hidden rounded-b-3xl opacity-20">
                <!-- Decorative background image pattern -->
                <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Food Background" class="w-full h-full object-cover">
            </div>
            <div class="relative z-10 px-6 pt-10 pb-8 flex flex-col items-center text-center">
                <div class="flex items-center justify-center gap-4 mb-4">
                    <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-dark font-bold text-xl shadow-md border-2 border-brand">
                        <i class="fa-solid fa-tree"></i>
                    </div>
                    <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-dark font-bold text-xl shadow-md border-2 border-brand">
                        <i class="fa-solid fa-utensils"></i>
                    </div>
                </div>
                <h1 class="text-2xl font-bold tracking-tight mb-1 text-orange-400">Warung Randu Rindu</h1>
                <p class="text-sm text-slate-300 mb-4"><i class="fa-solid fa-location-dot mr-1 text-brand"></i> Suruan Eco Park</p>
                <div class="bg-white/10 backdrop-blur-sm py-2 px-4 rounded-full text-xs font-medium border border-white/20">
                    <i class="fa-solid fa-clock mr-1 text-brand"></i> Buka Hari Ini • <i class="fa-brands fa-whatsapp ml-2 mr-1 text-green-400"></i> 0858-4724-1993
                </div>
            </div>
        </header>

        <!-- Category Navigation (Sticky) -->
        <div class="sticky top-0 z-20 bg-white/90 backdrop-blur-md shadow-sm border-b border-slate-100 py-3 px-4 flex gap-3 overflow-x-auto no-scrollbar mt-2" id="categoryNav">
            <!-- Populated by JS -->
        </div>

        <!-- Menu Content -->
        <main class="px-4 py-6 space-y-8" id="menuContainer">
            <!-- Populated by JS -->
        </main>

        <!-- Floating Cart Bottom Bar -->
        <div id="cartBar" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] p-4 cart-bar-enter z-50">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Total Pesanan</p>
                    <p class="text-xl font-bold text-dark" id="cartTotalText">Rp 0</p>
                </div>
                <div class="bg-brand-light text-brand-dark px-3 py-1 rounded-full text-sm font-bold flex items-center gap-2">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span id="cartCountText">0 Item</span>
                </div>
            </div>
            <button onclick="checkoutWA()" class="w-full bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-green-500/30 transition-all flex items-center justify-center gap-2 text-lg">
                <i class="fa-brands fa-whatsapp text-xl"></i>
                Pesan Sekarang via WA
            </button>
        </div>

    </div>

    <!-- JavaScript Data and Logic -->
    <script>
        // Data Menu (Berdasarkan gambar)
        const menuData = [
            {
                id: 'terbaru',
                name: "🌟 Menu Terbaru",
                description: "Spesial racikan baru dari dapur kami",
                items: [
                    { id: 't1', name: 'Nila Bumbu Acar + Nasi', price: 15000, img: 'fa-fish' },
                    { id: 't2', name: 'Asam-Asam Patin + Nasi', price: 15000, img: 'fa-fish-fins' },
                    { id: 't3', name: 'Nila Goreng + Nasi', price: 15000, img: 'fa-fish' },
                    { id: 't4', name: 'Garang Asam Patin + Nasi', price: 15000, img: 'fa-bowl-food' }
                ]
            },
            {
                id: 'makanan',
                name: "🍛 Makanan",
                description: "Pilihan lauk dan nasi yang mengenyangkan",
                items: [
                    { id: 'm1', name: 'Bakso', price: 10000, img: 'fa-bowl-food' },
                    { id: 'm2', name: 'Pop Mie', price: 10000, img: 'fa-bowl-food' },
                    { id: 'm3', name: 'Indomie + Telur', price: 10000, img: 'fa-bowl-rice' },
                    { id: 'm4', name: 'Seblak', price: 10000, img: 'fa-fire' },
                    { id: 'm5', name: 'Nasi + Telur Dadar', price: 10000, img: 'fa-egg' },
                    { id: 'm6', name: 'Nasi + Ayam Sambal', price: 12000, img: 'fa-drumstick-bite' },
                    { id: 'm7', name: 'Nasi + Lele Sambal', price: 12000, img: 'fa-fish' },
                    { id: 'm8', name: 'Nasi + Belut Sambal', price: 12000, img: 'fa-fish-fins' },
                    { id: 'm9', name: 'Nasi + Rica Belut', price: 13000, img: 'fa-fire' },
                    { id: 'm10', name: 'Nasi + Kutuk Sambal', price: 13000, img: 'fa-fish' },
                    { id: 'm11', name: 'Nasi + Becek Ayam', price: 15000, img: 'fa-drumstick-bite' },
                    { id: 'm12', name: 'Nasi + Mangut Kutuk', price: 15000, img: 'fa-bowl-food' },
                    { id: 'm13', name: 'Nasi + Becek Mentok', price: 20000, img: 'fa-drumstick-bite' },
                    { id: 'm14', name: 'Nasi Jagung', price: 2000, img: 'fa-bowl-rice' },
                    { id: 'm15', name: 'Nasi Putih', price: 4000, img: 'fa-bowl-rice' }
                ]
            },
            {
                id: 'camilan',
                name: "🍟 Camilan",
                description: "Cocok untuk teman ngobrol",
                items: [
                    { id: 'c1', name: 'Tahu Crispy', price: 5000, img: 'fa-cubes' },
                    { id: 'c2', name: 'Nuget + Sosis', price: 5000, img: 'fa-hotdog' },
                    { id: 'c3', name: 'Cireng', price: 5000, img: 'fa-cookie' },
                    { id: 'c4', name: 'Dimsum', price: 5000, img: 'fa-dumpling' },
                    { id: 'c5', name: 'Kentang Goreng', price: 7000, img: 'fa-french-fries' }
                ]
            },
            {
                id: 'minuman',
                name: "🍹 Minuman",
                description: "Segarkan harimu",
                items: [
                    { id: 'd1', name: 'Es Teh / Hangat', price: 5000, img: 'fa-glass-water' },
                    { id: 'd2', name: 'Es Jeruk / Hangat', price: 5000, img: 'fa-lemon' },
                    { id: 'd3', name: 'Es Blewah / Cao', price: 5000, img: 'fa-martini-glass' },
                    { id: 'd4', name: 'Es Nutrisari', price: 5000, img: 'fa-glass-water' },
                    { id: 'd5', name: 'Es Susu / Hangat', price: 5000, img: 'fa-mug-hot' },
                    { id: 'd6', name: 'Es Susu Jahe / Hangat', price: 5000, img: 'fa-mug-hot' },
                    { id: 'd7', name: 'Kopi Hitam', price: 5000, img: 'fa-mug-saucer' },
                    { id: 'd8', name: 'Air Mineral', price: 5000, img: 'fa-bottle-water' },
                    { id: 'd9', name: 'Es Chocolatos / Hangat', price: 6000, img: 'fa-mug-hot' },
                    { id: 'd10', name: 'Es Beng Beng / Hangat', price: 6000, img: 'fa-mug-hot' },
                    { id: 'd11', name: 'Es Good Day / Hangat', price: 6000, img: 'fa-mug-saucer' },
                    { id: 'd12', name: 'Es Milo / Hangat', price: 6000, img: 'fa-mug-hot' },
                    { id: 'd13', name: 'Kopi Susu', price: 6000, img: 'fa-mug-saucer' }
                ]
            }
        ];

        // State Aplikasi
        let cart = {}; // Format: { itemId: { quantity, data } }

        // Helper: Format Rupiah
        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        // Render Navigasi & Menu
        const renderApp = () => {
            const navContainer = document.getElementById('categoryNav');
            const menuContainer = document.getElementById('menuContainer');
            
            navContainer.innerHTML = '';
            menuContainer.innerHTML = '';

            menuData.forEach((category, index) => {
                // Buat tombol navigasi
                const navBtn = document.createElement('a');
                navBtn.href = `#${category.id}`;
                navBtn.className = `whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${index === 0 ? 'bg-brand text-white shadow-md shadow-brand/30' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;
                navBtn.innerText = category.name.replace(/🌟 |🍛 |🍟 |🍹 /, ''); // Clean icon for nav
                navContainer.appendChild(navBtn);

                // Setup klik navigasi untuk update warna aktif
                navBtn.addEventListener('click', (e) => {
                    document.querySelectorAll('#categoryNav a').forEach(el => {
                        el.className = 'whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200';
                    });
                    navBtn.className = 'whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-brand text-white shadow-md shadow-brand/30';
                });

                // Buat Section Kategori
                const section = document.createElement('section');
                section.id = category.id;
                section.className = "scroll-mt-20"; // Offset for sticky header
                
                let sectionHTML = `
                    <div class="mb-4">
                        <h2 class="text-xl font-bold text-dark flex items-center gap-2">${category.name}</h2>
                        <p class="text-xs text-slate-500">${category.description}</p>
                    </div>
                    <div class="grid grid-cols-1 gap-3">
                `;

                // Buat Item Card
                category.items.forEach(item => {
                    const fallbackIcon = item.img || 'fa-utensils';
                    sectionHTML += `
                        <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between gap-3 relative overflow-hidden transition-all hover:border-brand/30">
                            <!-- Aksen warna kiri -->
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand opacity-0 transition-opacity" id="accent-${item.id}"></div>
                            
                            <div class="flex items-center gap-3 flex-1">
                                <div class="w-12 h-12 rounded-xl bg-orange-50 text-brand flex items-center justify-center flex-shrink-0">
                                    <i class="fa-solid ${fallbackIcon} text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-slate-800 text-sm leading-tight mb-1">${item.name}</h3>
                                    <p class="text-brand font-bold text-sm">${formatRupiah(item.price)}</p>
                                </div>
                            </div>
                            
                            <div class="flex items-center bg-slate-50 rounded-lg p-1 border border-slate-200">
                                <button onclick="updateCart('${item.id}', -1, '${item.name}', ${item.price})" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-brand transition-colors active:scale-90">
                                    <i class="fa-solid fa-minus text-xs"></i>
                                </button>
                                <span id="qty-${item.id}" class="w-6 text-center text-sm font-bold text-dark">0</span>
                                <button onclick="updateCart('${item.id}', 1, '${item.name}', ${item.price})" class="w-8 h-8 flex items-center justify-center text-brand font-bold hover:bg-brand hover:text-white rounded-md transition-colors active:scale-90">
                                    <i class="fa-solid fa-plus text-xs"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });

                sectionHTML += `</div>`;
                section.innerHTML = sectionHTML;
                menuContainer.appendChild(section);
            });
        };

        // Fungsi Update Keranjang
        const updateCart = (id, change, name, price) => {
            if (!cart[id]) {
                cart[id] = { quantity: 0, name: name, price: price };
            }

            let newQty = cart[id].quantity + change;
            
            if (newQty <= 0) {
                delete cart[id];
                newQty = 0;
            } else {
                cart[id].quantity = newQty;
            }

            // Update UI Item
            document.getElementById(`qty-${id}`).innerText = newQty;
            
            const accent = document.getElementById(`accent-${id}`);
            if (accent) {
                accent.style.opacity = newQty > 0 ? '1' : '0';
            }

            updateCartUI();
        };

        // Fungsi Update Tampilan Keranjang Bawah
        const updateCartUI = () => {
            const cartBar = document.getElementById('cartBar');
            let totalItem = 0;
            let totalPrice = 0;

            for (const id in cart) {
                totalItem += cart[id].quantity;
                totalPrice += (cart[id].price * cart[id].quantity);
            }

            document.getElementById('cartTotalText').innerText = formatRupiah(totalPrice);
            document.getElementById('cartCountText').innerText = `${totalItem} Item`;

            if (totalItem > 0) {
                cartBar.classList.add('cart-bar-enter-active');
                cartBar.classList.remove('cart-bar-enter');
            } else {
                cartBar.classList.remove('cart-bar-enter-active');
                cartBar.classList.add('cart-bar-enter');
            }
        };

        // Fungsi Checkout ke WhatsApp
        const checkoutWA = () => {
            let totalItem = 0;
            let totalPrice = 0;
            let orderText = "Halo *Warung Randu Rindu*, saya ingin memesan:\n\n";

            for (const id in cart) {
                const item = cart[id];
                const subTotal = item.price * item.quantity;
                orderText += `▪️ ${item.quantity}x ${item.name} (${formatRupiah(item.price)})\n`;
                totalItem += item.quantity;
                totalPrice += subTotal;
            }

            if (totalItem === 0) return;

            orderText += `\n*Total Tagihan: ${formatRupiah(totalPrice)}*`;
            orderText += `\n\nApakah pesanan ini bisa segera diproses? Terima kasih.`;

            // Encode pesan untuk URL
            const encodedText = encodeURIComponent(orderText);
            
            // Nomor WA Tujuan (085847241993 diubah menjadi 6285847241993)
            const waNumber = "6285847241993"; 
            
            // Buka WhatsApp
            window.open(`https://wa.me/${waNumber}?text=${encodedText}`, '_blank');
        };

        // Inisialisasi saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            updateCartUI(); // Sembunyikan cart di awal
        });
    </script>
</body>
</html>
